<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando DoWhile</title>
</head>
<body>
    
    <h1>Testando DoWhila</h1>

    <script>
        let n = 1
        let tabuada = parseInt(prompt("A tabuada de que numero você gostaria de ver:"))
        do{
            document.write(n+" x " + tabuada + " = " + tabuada * n + "<br>")
            n++
        }while(n<=10)

    </script>

</body>
</html>
