<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas e notas</title>
</head>
<body>
    
    <h1>Medias Finais</h1>
<script>
let numero1 = parseFloat(prompt("Primeira nota do aluno:"))
let numero2 = parseFloat(prompt("Segunda nota do aluno:"))
let numero3 = parseFloat(prompt("Terceira nota do aluno:"))
let numero4 = parseFloat(prompt("Quarta nota do aluno:"))

let mediaFinal = (numero1+numero2+numero3+numero4)/4

document.write("<br>Nota 1:" + numero1)
document.write("<br>Nota 2:" + numero2)
document.write("<br>Nota 3:" + numero3)
document.write("<br>Nota 4:" + numero4)
document.write("<br>Nota Final:" + mediaFinal)

</script>

</body>
</html>
