<html lang="pt-br">
<head>

    <title>Testando calculos usando JavaScript</title>
</head>
<body>
    
    <h1>Testando calculos usando JavaScript</h1>
<script>
let numero1 = 20;
let numero2 = 40;
let soma= numero1+numero2;
let media= (numero1+numero2)/2;
let multiplicacao= numero1*numero2;
let divisao = numero1/ numero2;

document.write("a soma dos numeros é:" + soma)
document.write("<br>a média dos numeros é:" + media)
document.write("<br>a multiplicação dos numeros é:" + multiplicacao)
document.write("<br>a divisão dos numeros é:" + divisao)
</script>

</body>
