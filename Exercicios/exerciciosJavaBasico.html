    <h1>Exercicio Java Basico</h1>

    <script>
    
function att1(){
    // 1. Faça um algoritmo que leia a idade de uma pessoa expressa em anos, meses e dias e mostre-a expressa em dias.
    //  Leve em consideração o ano com 365 dias e o mês com 30. (Ex: 3 anos, 2 meses e 15 dias = 1170 dias.)
    let ano = parseInt(prompt("Digite o ano da sua idade:"))
    let dias = parseInt(prompt("Digite os dias da sua idade:"))
    let meses = parseInt(prompt("Digite os meses da sua idade:"))
    let diastotal = ano * 365 + dias + meses * 30

        document.write("Você tem:" + diastotal + " dias de vida.")
}
function att2(){
//2. Fazer um programa que imprima a média aritmética dos números 8,9 e 7. A média dos números 4, 5 e 6.
//  A soma das duas médias. A média das médias.

    let numeroalt1 = 7
    let numeroalt2 = 8
    let numeroalt3 = 9
    let numerobx1 = 4
    let numerobx2 = 5
    let numerobx3 = 6

    let mediaalt = numeroalt1 + numeroalt2 + numeroalt3 /3
    let mediabx = numerobx1 + numerobx2 + numerobx3 /3

    let mediafinal = mediaalt + mediabx /2

    document.write("a média dos numeros altos é:" + mediaalt)
    document.write("<br>a média dos numeros baixos é:" + mediabx)
    document.write("<br>a média da média dos numeros altos e baixos é:" + mediafinal)



}

function att3(){
    //3. Informar um saldo e imprimir o saldo com reajuste de 1%.
let saldo = parseFloat(prompt("Digite seu saldo:"))

let reajuste = saldo /100 
let saldofinal = saldo - reajuste

document.write("Seu saldo é:" + saldo)
document.write("<br>Com o reajuste de 1%:" + saldofinal)

} 

function att4(){
//4. Escrever um algoritmo que lê:
//- a porcentagem do IPI a ser acrescido no valor das peças
//- o código da peça 1, valor unitário da peça 1, quantidade de peças 1
//- o código da peça 2, valor unitário da peça 2, quantidade de peças 2
//O algoritmo deve calcular o valor total a ser pago e apresentar o resultado.
//Fórmula : (valor1*quant1 + valor2*quant2)*(IPI/100 + 1)

let namepeca1 = "serrinha"
let peca1valor = 33.30
let quantidadep1 = parseInt(prompt("Coloque o numero de " + namepeca1 +  " que você deseja:")) 

let namepeca2 = "parafuso reto"
let peca2valor = 33.30
let quantidadep2= parseInt(prompt("Coloque o numero de " + namepeca2 + " que você deseja:")) 
let ipi = parseInt(prompt("Escreva a porcentagem a ser acrescentada no valor do produto:"))

let valortotal = (peca1valor*quantidadep1 + peca2valor*quantidadep2)*(ipi/100 + 1)


document.write("O valor total das peças é:" + valortotal)
}

function att5(){
    //5. Crie um algoritmo que leia o valor do salário mínimo e o valor
    //  do salário de um usuário, calcule a quantidade de salários mínimos esse usuário ganha e imprima o resultado. (1SM=R$788,00)
    let salarioUsuario = parseFloat(prompt("Qual seu salario:"))


    let quantidadeDeSalario = salarioUsuario/ 788

    document.write("O valor de salários minimos é:" + quantidadeDeSalario.toFixed(2))

}

function att6(){
    //6. Desenvolva um algoritmo em Java que leia um número inteiro e imprima o seu antecessor e seu sucessor.

    let numero = parseInt(prompt("Digite seu numero inteiro:"))
    let antescessor = numero-1
    let sucessor = numero+1 
    
    document.write(" seu numero é: " + numero+ " o numero antes dele é: " + antescessor + " e seu numero sucessor é: " + sucessor )
}
