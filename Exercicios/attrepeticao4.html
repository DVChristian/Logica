<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATT 4</title>
</head>
<body>
    <h1>ATT 4</h1>

    <script>
        let calculo = 0
        let quantidade = 0

        for(n = 15; n <=100; n++){
            calculo += n
            quantidade ++
        }

        let media = calculo / quantidade

        document.write("Foram calculados:" + quantidade + " numeros <br>")
        document.write("E a soma desses numeros deu:" + calculo + "<br>")
        document.write("A média do numero 15 até o 100 é igual á:" + media)

    </script>


</body>
</html>
