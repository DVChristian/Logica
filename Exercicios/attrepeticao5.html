<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATT 5</title>
</head>
<body>
    <h1>ATT 5</h1>

    

    <script>
let valor1 = parseInt(prompt("Digite um numero:"))
let valor2 = parseInt(prompt("Digite um numero maio que o numero anterior:"))

let soma = 0
let quantidade = 0

for(n = valor1; n<= valor2; n++)
{
    soma += n
    quantidade++

}
let media = soma / quantidade

document.write("A média de" + valor1 + " á " + valor2 + "é igual a:" + media)

    </script>

</body>
</html>
