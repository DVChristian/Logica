<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo Switch Case</title>
</head>
<body>
<h1>Testando comandos Switch/Case</h1>

<script>

let semaforo = prompt("Digite a cor do semaforo")

switch(semaforo.toLowerCase()){
case "vermelho": alert("PARE")
break
case "amarelo": alert("ATENÇÃO")
break
case "verde": alert("ANDE")
break

default: alert("COR INESISTENTE")
}

</script>

    
</body>
</html>
