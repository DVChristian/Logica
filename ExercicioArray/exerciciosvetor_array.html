//08) Escreva um programa que leia 5 números inteiros e calcule a média dos valores pares e a média dos valores ímpares.
         function atividade8()
         {
            let numero = []
        let pares = 0
        let impares = 0
        let somap = 0
        let somai = 0
        let mediap = 0
        let mediai = 0
        for(let i = 0; i<5; i++){
            numero[i] = parseInt(prompt("Digite um número"))
            if(numero[i] %2 == 0){
                somap+= numero[i]
                pares++
            }else{
                somai+= numero[i]
                impares++
            }
            mediap=somap/pares
            mediai=somai/impares
        }
        console.log("Média dos números pares: "+ mediap + "\nMédia dos números impares: "+mediai)
         }
