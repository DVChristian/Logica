<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>num while</title>
</head>
<body>
    
    <h1>Num while</h1>

    <script>
        let n =1
        while(n <=100){
            document.write(n)
            n+=2
        }

    </script>
</body>
</html>
