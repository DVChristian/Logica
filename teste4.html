<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando calculos no JavaScript</title>
</head>
<body>
    
<h1>Testando calculos no JavaScript</h1>

<script>
    let numero1 = parseFloat (prompt("entre com o primeiro número"));
    let numero2 = parseFloat(prompt("entre com o segundo número"));

    let soma = numero1 + numero2

    document.write("a soma dos numeros deu:" + soma);
    document.write("<br>seu primeiro numero é:" + numero1);
    document.write("<br>seu segundo numero é:" + numero2);

</script>

</body>
</html>
